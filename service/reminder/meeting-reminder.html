<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Meeting Reminder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .client {
      font-size: 18px;
      color: #2b6cb0;
      font-weight: bold;
    }
    .time {
      margin: 12px 0;
      font-size: 16px;
    }
    .note-box {
      background: #edf2f7;
      padding: 10px;
      border-left: 4px solid #2b6cb0;
      margin-top: 10px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">📅 Meeting Reminder</div>

    <p>Hello,</p>

    <p>Today is the <b>meeting</b> scheduled with:</p>

    <p class="client">{{client}}</p>

    <div class="time">
      ⏰ <b>Meeting At:</b> {{meetingAt}} <br/>
      🔔 <b>Reminder Time:</b> {{reminderAt}}
    </div>

    <div class="note-box">
      📝 <b>Note:</b> {{note}}
    </div>

    <p style="margin-top:18px;">Please make sure to attend it on time.</p>

    <p>Thank you,</p>
    <p><b>Meeting Reminder Service </b></p>
  </div>
</body>
</html>
