<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Admin Reminder</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }
      .card {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        max-width: 500px;
        margin: auto;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    
    </style>
  </head>
  <body>
    <div class="card">
      <h2>⏰ Reminder</h2>
      <p>Hello {{name}},</p>
      <p>{{description}}</p>
      <p><b>Time:</b> {{reminderAt}}</p>
    </div>
  </body>
</html>
